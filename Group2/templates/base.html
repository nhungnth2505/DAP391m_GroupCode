<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudentPath — Student Guidance Dashboard</title>
  <meta name="description" content="AI-powered student guidance system with career prediction, performance forecasting, stress analysis, and intelligent chatbot advisor.">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%230D7377' width='100' height='100' rx='15'/><text x='50' y='65' text-anchor='middle' fill='white' font-size='50' font-family='serif'>S</text></svg>">
</head>
<body class="has-sidebar">
  <nav class="sidebar">
    <div class="sidebar-header">
      <a href="{{ url_for('landing') }}" class="sidebar-logo">
        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="32" height="32" rx="6" fill="currentColor"/>
          <path d="M8 24V8h8c2.2 0 4 1.8 4 4s-1.8 4-4 4H12v8H8zm4-8h3c1.1 0 2-.9 2-2s-.9-2-2-2h-3v4z" fill="#1A1A2E"/>
          <circle cx="22" cy="22" r="4" fill="#E8A838"/>
        </svg>
        <div>
          <div class="sidebar-title">StudentPath</div>
          <div class="sidebar-subtitle">Guidance Dashboard</div>
        </div>
      </a>
    </div>

    <div class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-section-label">Predictions</div>
        <a href="{{ url_for('career') }}" class="nav-item {{ 'active' if module == 'career' else '' }} career">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/>
            <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
          </svg>
          Career
        </a>
        <a href="{{ url_for('performance') }}" class="nav-item {{ 'active' if module == 'performance' else '' }} performance">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
          </svg>
          Performance
        </a>
        <a href="{{ url_for('stress') }}" class="nav-item {{ 'active' if module == 'stress' else '' }} stress">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
          Stress Level
        </a>
      </div>

      <div class="nav-section">
        <div class="nav-section-label">Support</div>
        <a href="{{ url_for('chat') }}" class="nav-item {{ 'active' if module == 'chat' else '' }} chat">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
          AI Advisor
        </a>
      </div>

      <div class="nav-section" style="margin-top: auto;">
        <a href="{{ url_for('landing') }}" class="nav-item" style="opacity: 0.6;">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          ← Home
        </a>
      </div>
    </div>

    <div class="sidebar-footer">
      <div id="current-time"></div>
    </div>
  </nav>

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
